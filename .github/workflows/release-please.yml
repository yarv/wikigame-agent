name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Use a PAT (not GITHUB_TOKEN) so PRs opened by this action trigger
          # required-status-check workflows — GitHub deliberately skips
          # workflows on events caused by GITHUB_TOKEN to prevent recursion.
          # See CONTRIBUTING.md for the fine-grained PAT scopes required.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
